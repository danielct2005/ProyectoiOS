<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <title>Mis Finanzas</title>
  <meta name="title" content="Mis Finanzas - Gestión Personal">
  <meta name="description" content="App personal de gestión de finanzas">
  
  <meta name="theme-color" content="#007aff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mis Finanzas">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Mis Finanzas">
  <meta name="msapplication-TileColor" content="#007aff">
  <meta name="msapplication-tap-highlight" content="no">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23007aff' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>💰</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23007aff' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>💰</text></svg>">
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="offline-banner" id="offlineBanner">
    Sin conexión - Modo offline activo
  </div>

  <!-- Hamburger Menu -->
  <div class="menu-overlay" id="menuOverlay"></div>
  <div class="hamburger-menu" id="hamburgerMenu">
    <div class="menu-header">
      <span class="menu-title">Menú</span>
    </div>
    <div class="menu-content">
      <button class="menu-item active" data-section="finanzas">
        <span class="menu-icon">💰</span>
        <span>Finanzas</span>
      </button>
      <button class="menu-item" data-section="agenda">
        <span class="menu-icon">📅</span>
        <span>Agenda</span>
      </button>
      <button class="menu-item" data-section="ajustes">
        <span class="menu-icon">⚙️</span>
        <span>Ajustes</span>
      </button>
    </div>
  </div>

  <div class="app">
    <header class="header">
      <button class="header__btn" id="menuBtn">☰</button>
      <div class="header__title" id="headerTitle">Billetera</div>
      <button class="header__btn" id="darkModeBtn" title="Modo oscuro">🌙</button>
    </header>

    <main class="main">
      <!-- Content will be rendered by JavaScript -->
    </main>

    <!-- Sub-nav for subsections (appears at bottom) -->
    <nav class="nav sub-nav-bottom" id="subNavBottom">
      <!-- Content rendered by JavaScript -->
    </nav>
  </div>

  <script src="script.js"></script>
  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('sw.js');
          console.log('SW registrado:', registration.scope);
        } catch (error) {
          console.error('Error al registrar SW:', error);
        }
      });
    }

    // Online/Offline Status
    const updateOnlineStatus = () => {
      const isOnline = navigator.onLine;
      const bannerEl = document.getElementById('offlineBanner');
      if (isOnline) {
        bannerEl.classList.remove('visible');
      } else {
        bannerEl.classList.add('visible');
      }
    };

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();
  </script>
</body>
</html>
